<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sohna Vehicle Booking System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{
  color-scheme:light;
  --paper:#f6f3ec;--card:#fffdf8;--ink:#2a2723;--muted:#7a7468;--faint:#a8a194;
  --line:#e4ddcf;--line-strong:#d2c9b6;--accent:#1d6b4f;--accent-soft:#e3f0e8;
  --accent-ink:#0f4a35;--amber:#9a6a18;--amber-soft:#f6ecd6;--danger:#a3352d;
  --danger-soft:#f6e3e1;--blocked:#e5e1d8;--radius:10px;
  --col-corner:190px;--col-date:170px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",system-ui,sans-serif;font-size:15px}
body{padding:28px 18px 80px;line-height:1.6}
.page{max-width:1280px;margin:0 auto}

header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px}
h1{font-family:"Noto Serif TC",serif;font-weight:700;font-size:27px;letter-spacing:1px;display:flex;align-items:center;gap:10px}
h1 .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);display:inline-block}
.sub{color:var(--muted);font-size:14px;margin:8px 0 24px;line-height:2}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{font-family:inherit;font-size:14px;cursor:pointer;background:var(--card);color:var(--ink);border:1px solid var(--line-strong);border-radius:var(--radius);padding:10px 18px;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn:hover{background:#fff;border-color:var(--muted)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-ink)}
.btn svg{width:15px;height:15px}
.badge{background:var(--amber-soft);color:var(--amber);border:1px solid #e8d6a8;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:500;display:none;align-items:center;gap:6px}
.badge.on{display:inline-flex}
.section-title{font-family:"Noto Serif TC",serif;font-size:17px;font-weight:600;margin:32px 0 12px;display:flex;align-items:center;gap:8px}
.section-title .dot2{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block}

/* Tables */
.tablewrap{background:var(--card);border:1px solid var(--line-strong);border-radius:14px;overflow-x:auto;box-shadow:0 1px 0 #fff inset}
table{border-collapse:collapse;width:100%;table-layout:fixed;font-size:15px}
th,td{border:1px solid var(--line);vertical-align:middle;text-align:center;padding:0}
th.corner,td.person{width:var(--col-corner);min-width:var(--col-corner)}
th.date{width:var(--col-date);min-width:var(--col-date)}
thead th{background:#efe9dc;position:sticky;top:0;z-index:2}
th.corner{color:var(--muted);font-weight:500;font-size:13px;padding:12px 10px;text-align:center;vertical-align:middle}
th.date{padding:10px 8px;line-height:1.5}
th.date .d{font-weight:700;font-size:16px;font-family:"Noto Serif TC",serif}
th.date .w{font-size:12px;color:var(--muted);font-weight:400}
th.date.today .d{color:var(--accent)}
th.date.today{background:var(--accent-soft)}
th.date.yest .d{color:var(--faint)}
th.date.blkd{background:var(--blocked)}
th.date.blkd .d, th.date.blkd .w{color:var(--faint)}

/* Person column */
td.person{background:#fbf8f1;vertical-align:middle}
.phead{padding:14px 12px;cursor:pointer;user-select:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.pname{display:flex;align-items:center;gap:6px;font-weight:700;font-size:16px;justify-content:center}
.pname .chev{width:14px;height:14px;color:var(--faint);transition:.2s;flex-shrink:0}
.phead.open .chev{transform:rotate(180deg)}
.paddr-line{font-size:11.5px;color:var(--muted);line-height:1.4;word-break:break-word;text-align:center;max-width:140px}
.pmenu{display:none;flex-direction:column;gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line-strong);width:100%}
.phead.open .pmenu{display:flex}
.mbtn{font-family:inherit;font-size:12px;cursor:pointer;background:#fff;border:1px solid var(--line-strong);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:5px;color:var(--ink);width:100%;justify-content:center}
.mbtn:hover{border-color:var(--muted)}
.mbtn svg{width:13px;height:13px}
.mbtn.danger{color:var(--danger);border-color:#e3b8b3}
.mbtn.danger:hover{background:var(--danger-soft)}

/* Data cells */
.cell{padding:10px 8px;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative}
.cell.blkd{background:var(--blocked);cursor:pointer}
.cell.blkd:hover .blocked-msg{filter:brightness(.95)}
.blocked-msg{font-size:13px;color:var(--faint);font-style:italic;text-align:center;user-select:none}
.cell-sunday{font-size:32px;line-height:1;cursor:pointer;user-select:none;text-align:center}

/* Flash overlay */
.flash-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:10px;background:rgba(227,240,232,0.96);border-radius:inherit;z-index:10;font-size:14px;font-weight:700;color:var(--accent-ink);text-align:center;line-height:1.5;animation:fadein .3s ease;cursor:default}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* Prompt button */
.cell-prompt{background:var(--accent-soft);color:var(--accent-ink);border:1px dashed #9fcfb5;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13.5px;font-weight:500;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s;font-family:inherit;width:100%}
.cell-prompt:hover{background:#d0eadb;border-style:solid}
.cell-prompt svg{width:15px;height:15px;flex-shrink:0}

/* Scroll time picker */
.tp-wrap{display:flex;align-items:center;gap:0;background:#fff;border:1.5px solid var(--line-strong);border-radius:14px;padding:4px 6px;width:152px;flex-shrink:0}
.sp-col-outer{display:flex;flex-direction:column;align-items:center;gap:0;width:56px}
.sp-arrow{font-family:inherit;font-size:10px;cursor:pointer;background:none;border:none;color:var(--faint);padding:1px 5px;border-radius:6px;line-height:1;transition:.1s;user-select:none}
.sp-arrow:hover{background:var(--accent-soft);color:var(--accent-ink)}
.sp-col{width:56px;height:132px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;overscroll-behavior:contain;
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 28%,black 72%,transparent 100%);
  mask-image:linear-gradient(to bottom,transparent 0%,black 28%,black 72%,transparent 100%);}
.sp-col::-webkit-scrollbar{display:none}
.sp-item{height:44px;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif TC",serif;font-size:22px;scroll-snap-align:center;cursor:pointer;color:var(--faint);transition:color .15s,font-size .15s}
.sp-item.sel{color:var(--ink);font-size:26px;font-weight:700}
.tp-sep{font-family:"Noto Serif TC",serif;font-size:26px;font-weight:700;color:var(--ink);padding:0 2px;flex-shrink:0;margin-bottom:4px}

/* Saved time display */
.time-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.time-badge{background:var(--accent);color:#fff;border-radius:10px;padding:6px 16px;font-size:18px;font-weight:700;font-family:"Noto Serif TC",serif;letter-spacing:1px;line-height:1.2}
.cell-btn{font-family:inherit;font-size:12px;cursor:pointer;border-radius:8px;padding:5px 11px;border:1.5px solid;display:inline-flex;align-items:center;gap:4px;font-weight:600;transition:.13s}
.cell-btn.save-time{background:var(--accent);color:#fff;border-color:var(--accent)}
.cell-btn.save-time:hover{background:var(--accent-ink)}
.cell-btn.cancel{background:#fff;color:var(--muted);border-color:var(--line-strong)}
.cell-btn.cancel:hover{border-color:var(--muted);color:var(--ink)}
.cell-btn.edit-time{background:#fff;color:var(--accent-ink);border-color:#9fcfb5;font-size:12px}
.cell-btn.edit-time:hover{background:var(--accent-soft)}
.picker-actions{display:flex;gap:7px;justify-content:center}

.admininfo{border-top:1px dashed var(--line-strong);padding-top:6px;display:flex;flex-direction:column;gap:4px;width:100%}
.arow{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);justify-content:center}
.arow svg{width:14px;height:14px;flex-shrink:0;color:var(--accent)}
.plate{background:var(--amber-soft);color:var(--amber);border:1px solid #e8d6a8;border-radius:6px;padding:1px 7px;font-weight:600;letter-spacing:.5px;font-size:12.5px}

.addrow td{background:#fbf8f1}
.addperson{width:calc(100% - 18px);margin:9px;background:transparent;border:1px dashed var(--line-strong);border-radius:9px;color:var(--muted);font-size:14px;padding:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.addperson:hover{background:#fff;color:var(--ink);border-color:var(--muted)}
.addperson svg{width:14px;height:14px}
.empty-row{padding:40px 16px;text-align:center;color:var(--faint);font-size:14px}

/* Import section */
#importSection{display:none}
#importSection.on{display:block}
#paste-grid{table-layout:auto}
#paste-grid th.date{min-width:var(--col-date);width:auto}
#paste-grid td.person{vertical-align:top}
.paste-phead{padding:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
.paste-pname{font-weight:700;font-size:15px}
.paste-paddr{font-size:11.5px;color:var(--muted);text-align:center;word-break:break-word;max-width:140px}
.paste-cell{padding:8px;min-height:150px;display:flex;flex-direction:column;gap:6px}
.paste-cell.blkd{background:var(--blocked)}
.paste-area{border:1px dashed var(--line-strong);border-radius:8px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;padding:7px 9px;resize:both;min-height:90px;width:100%}
.paste-area:focus{outline:none;border-color:var(--accent);border-style:solid}
.paste-area.has-error{border-color:var(--danger);border-style:solid;background:var(--danger-soft)}
.paste-success{background:#e6f5ec;color:#1a6b3a;border:1px solid #b0ddc0;border-radius:8px;padding:8px 12px;font-size:13.5px;font-weight:700;text-align:center}
.paste-err-list{background:var(--danger-soft);color:var(--danger);border:1px solid #e3b8b3;border-radius:8px;padding:8px 12px;font-size:13px;line-height:2}
.paste-clearbtn{font-family:inherit;font-size:13px;cursor:pointer;background:#fff;border:1.5px solid var(--line-strong);border-radius:8px;padding:7px 18px;color:var(--muted);font-weight:500;align-self:flex-start}
.paste-clearbtn:hover{border-color:var(--danger);color:var(--danger)}

/* Holiday section */
#holidaySection{display:none;margin-top:32px}
#holidaySection.on{display:block}
.hol-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.hol-row{background:var(--card);border:1px solid var(--line-strong);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.13s}
.hol-row:hover{background:#fff;border-color:var(--muted)}
.hol-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0}
.hol-label{flex:1;font-size:14px;font-weight:500;color:var(--ink)}
.hol-del{font-family:inherit;font-size:12px;cursor:pointer;background:transparent;border:1px solid #e3b8b3;border-radius:7px;padding:4px 10px;color:var(--danger)}
.hol-del:hover{background:var(--danger-soft)}
.add-holiday{width:100%;background:transparent;border:1px dashed var(--line-strong);border-radius:9px;color:var(--muted);font-size:14px;padding:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.add-holiday:hover{background:#fff;color:var(--ink);border-color:var(--muted)}

/* Calendar */
.cal-wrap{padding:4px 0 12px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-hdr button{font-family:inherit;font-size:18px;cursor:pointer;background:none;border:none;color:var(--ink);padding:4px 10px;border-radius:6px}
.cal-hdr button:hover{background:var(--accent-soft)}
.cal-title{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:600}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dh{text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13.5px;border-radius:8px;cursor:pointer;transition:.1s;color:var(--ink)}
.cal-cell:hover{background:var(--accent-soft);color:var(--accent-ink)}
.cal-cell.empty{cursor:default}
.cal-cell.empty:hover{background:none}
.cal-cell.c-start,.cal-cell.c-end{background:var(--accent);color:#fff}
.cal-cell.c-range,.cal-cell.c-hover{background:var(--accent-soft);color:var(--accent-ink)}
.cal-cell.c-today{font-weight:700;box-shadow:inset 0 0 0 1.5px var(--accent)}
.cal-sel-text{font-size:13px;color:var(--muted);margin-top:10px;min-height:20px;text-align:center}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(30,26,20,.4);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.overlay.on{display:flex}
.modal{background:var(--card);border:1px solid var(--line-strong);border-radius:14px;padding:24px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.18)}
.modal.wide{max-width:380px}
.modal h3{font-family:"Noto Serif TC",serif;font-size:18px;font-weight:600;margin-bottom:16px}
.modal input{width:100%;border:1px solid var(--line-strong);border-radius:9px;padding:11px 14px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;margin-bottom:16px}
.modal input:focus{outline:none;border-color:var(--accent)}
.modal .acts{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}

/* Access gate */
#accessOverlay{z-index:100;background:var(--paper)}
#accessOverlay .modal{text-align:center}
#accessOverlay .modal h3{font-size:20px;margin-bottom:6px}
.access-sub{font-size:14px;color:var(--muted);margin-bottom:18px}
.access-logo{font-size:36px;margin-bottom:12px}
#accessInput{text-align:center;letter-spacing:2px}

/* Loading overlay */
#loadOverlay{z-index:95;background:var(--paper)}
#loadOverlay .modal{text-align:center;border:none;background:transparent;box-shadow:none}
.load-spinner{width:36px;height:36px;border:3px solid var(--line-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sync indicator */
#syncDot{width:9px;height:9px;border-radius:50%;background:#b0b0a8;display:inline-block;margin-left:8px;vertical-align:middle;transition:background .3s}
#syncDot.saving{background:#d4a017;animation:pulse 1s infinite}
#syncDot.synced{background:#22c55e;animation:popGreen .5s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes popGreen{0%{transform:scale(1.5);background:#22c55e}100%{transform:scale(1);background:#22c55e}}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:30px;font-size:14px;opacity:0;transition:.25s;z-index:60;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:680px){h1{font-size:20px}body{padding:14px 8px 60px}}
</style>
</head>
<body>
<div class="page">

  <header class="top">
    <div>
      <h1><span class="dot"></span>Sohna Vehicle Booking System<span id="syncDot" title="Synced"></span></h1>
    </div>
    <div class="controls">
      <span class="badge" id="adminBadge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1l9 4v6c0 5-3.8 9.4-9 11-5.2-1.6-9-6-9-11V5z"/></svg>
        Admin Mode
      </span>
      <button class="btn" id="adminBtn" onclick="toggleAdmin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1l9 4v6c0 5-3.8 9.4-9 11-5.2-1.6-9-6-9-11V5z"/></svg>
        Admin Login
      </button>
    </div>
  </header>

  <p class="sub">
    · Click your name to set your address or remove yourself<br>
    · Add pickup times in date<br>
    · Driver info will be shared by 11pm the night before
  </p>

  <div class="section-title"><span class="dot2"></span>Schedule</div>
  <div class="tablewrap" id="schedWrap">
    <table id="grid"><thead><tr id="head"></tr></thead><tbody id="body"></tbody></table>
  </div>

  <!-- Admin only -->
  <div id="importSection">
    <div class="section-title" style="margin-top:40px">
      <span class="dot2"></span>Driver Info
      <span style="font-size:13px;color:var(--muted);font-family:sans-serif;font-weight:400;margin-left:4px">— Paste booking confirmation and validate</span>
    </div>
    <div class="tablewrap" id="pasteWrap">
      <table id="paste-grid"><thead><tr id="paste-head"></tr></thead><tbody id="paste-body"></tbody></table>
    </div>

    <!-- Holiday -->
    <div id="holidaySection" class="on">
      <div class="section-title" style="margin-top:36px"><span class="dot2"></span>Holiday</div>
      <div class="hol-list" id="holList"></div>
      <button class="add-holiday" onclick="openCalModal(null)">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Add Holiday
      </button>
    </div>
  </div>

</div>

<!-- Loading overlay -->
<div class="overlay on" id="loadOverlay">
  <div class="modal">
    <div class="load-spinner"></div>
    <p style="color:var(--muted);font-size:14px">Connecting…</p>
  </div>
</div>

<!-- Access gate -->
<div class="overlay" id="accessOverlay">
  <div class="modal">
    <h3>Hi</h3>
    <input id="accessInput" type="password" autocomplete="off" placeholder="">
    <div class="acts" style="justify-content:center">
      <button class="btn primary" onclick="doAccess()">Enter</button>
    </div>
  </div>
</div>

<!-- Generic modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="mTitle">Enter</h3>
    <input id="mInput" autocomplete="off">
    <div class="acts">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="confirmModal()">Confirm</button>
    </div>
  </div>
</div>

<!-- Calendar modal -->
<div class="overlay" id="calOverlay">
  <div class="modal wide">
    <h3>Select Holiday</h3>
    <div class="cal-wrap" id="calContainer"></div>
    <div class="cal-sel-text" id="calSelText"></div>
    <div class="acts">
      <button class="btn" onclick="closeCalModal()">Cancel</button>
      <button class="btn primary" onclick="saveCalModal()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Firebase ──
const fbApp = firebase.initializeApp({
  apiKey: "AIzaSyDc3y0BWxLRqeA7pr9cLga-oXdstO2T2qs",
  authDomain: "sohna-80f5f.firebaseapp.com",
  databaseURL: "https://sohna-80f5f-default-rtdb.firebaseio.com",
  projectId: "sohna-80f5f",
  storageBucket: "sohna-80f5f.firebasestorage.app",
  messagingSenderId: "511763453474",
  appId: "1:511763453474:web:f08599365265b059b95c7b"
});
const db    = firebase.database();
const dbRef = db.ref('sohna');

// ── Constants ──
const ADMIN_EMAIL = 'admin@sohna.local';
const USER_EMAIL  = 'user@sohna.local';
const FLASH_MSGS = [
  'Stay home, Stay safe',
  'Please contact Mr No',
  'Highly suggest WFH',
  'Unplanned downtime (this system)',
  'Round out the jokes, pls don\'t click again',
  '👋🏻😁',
  '🫵🏻🫥'
];

let state = { persons:[], addresses:{}, cells:{}, admin:{}, holidays:[] };
let isAdmin       = false;
let modalCb       = null;
let pasteResults  = {};
let cellEditState = {};
let calPicker     = null;
let calEditId     = null;
let fbListening   = false;

const I = {

  pin:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>',

};

function esc(s){ return (s+'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function jsesc(s){ return (s+'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function ckey(p,iso){ return p+'|'+iso; }
function pad2(n){ return String(n).padStart(2,'0'); }
function genId(){ return Math.random().toString(36).slice(2,8); }

function localISO(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function timeToMins(t){ if(!t)return NaN; const m=t.match(/(\d{1,2}):(\d{2})/); return m?parseInt(m[1])*60+parseInt(m[2]):NaN; }
function stripPrefix(n){ return (n||'').replace(/^\s*(Mr\.?|Mrs\.?|Ms\.?|Miss\.?|Dr\.?|Prof\.?|Sir\.?|Mdm\.?|Madam\.?|Mx\.?)\s*/i,'').trim(); }
function isHoliday(iso){ return (state.holidays||[]).some(h=>iso>=h.start&&iso<=(h.end||h.start)); }
function fmtHolRange(h){ return h.start===h.end?h.start:(h.start+' → '+h.end); }

function matchDate(str,col){
  if(!str)return false; str=str.trim();
  const M={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  const cs=new Set(); const p=n=>String(n).padStart(2,'0'); let m;
  m=str.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})$/); if(m)cs.add(`${m[1]}-${p(m[2])}-${p(m[3])}`);
  m=str.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})$/); if(m){cs.add(`${m[3]}-${p(m[2])}-${p(m[1])}`);cs.add(`${m[3]}-${p(m[1])}-${p(m[2])}`);}
  m=str.match(/^(\d{1,2})\s+([A-Za-z]{3,})\s+(\d{4})$/); if(m){const mo=M[m[2].toLowerCase().slice(0,3)];if(mo)cs.add(`${m[3]}-${mo}-${p(m[1])}`);}
  m=str.match(/^([A-Za-z]{3,})\s+(\d{1,2}),?\s+(\d{4})$/); if(m){const mo=M[m[1].toLowerCase().slice(0,3)];if(mo)cs.add(`${m[3]}-${mo}-${p(m[2])}`);}
  const d=new Date(str); if(!isNaN(d))cs.add(localISO(d));
  return cs.has(col);
}

// ── Normalize state ──
function normalize(){
  state.persons  = state.persons  || [];
  state.addresses= state.addresses|| {};
  state.cells    = state.cells    || {};
  state.admin    = state.admin    || {};
  state.holidays = state.holidays !== undefined ? state.holidays : null;
  if(!state.holidays){
    const now=new Date(), add=(n)=>{const d=new Date(now);d.setDate(now.getDate()+n);return localISO(d);};
    state.holidays=[{id:genId(),start:add(7),end:add(7)},{id:genId(),start:add(21),end:add(23)}];
  }
  // Fix legacy array format
  if(!Array.isArray(state.persons)) state.persons = Object.values(state.persons);
  if(!Array.isArray(state.holidays)) state.holidays = Object.values(state.holidays);
  Object.keys(state.cells).forEach(k=>{
    const c=state.cells[k]; if(c.times&&c.times.length&&!c.time){c.time=c.times[0];} delete c.times;
  });
}

// ── Save to Firebase ──
let saveTimer, syncResetTimer;
function save(){
  const dot=document.getElementById('syncDot');
  if(dot){dot.classList.remove('synced');dot.classList.add('saving');}
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    dbRef.set(state)
      .then(()=>{
        if(dot){
          dot.classList.remove('saving');
          dot.classList.add('synced');
          clearTimeout(syncResetTimer);
          syncResetTimer=setTimeout(()=>dot.classList.remove('synced'),3000);
        }
      })
      .catch(()=>{
        if(dot)dot.classList.remove('saving');
        toast('⚠ Sync error');
      });
  },300);
}

// ── Load from Firebase (real-time) ──
function startListening(){
  if(fbListening) return;
  fbListening=true;
  dbRef.on('value', snapshot=>{
    const data=snapshot.val();
    if(data){ state=data; normalize(); }
    else { normalize(); }
    document.getElementById('loadOverlay').classList.remove('on');
    render(); renderPasteTable(); renderHolidays();
    bindScrollSync();
  }, err=>{
    document.getElementById('loadOverlay').classList.remove('on');
    toast('⚠ Cannot connect to database');
    normalize();
    render(); renderPasteTable(); renderHolidays();
    bindScrollSync();
  });
}

// ── Scroll sync ──
function bindScrollSync(){
  const a=document.getElementById('schedWrap'), b=document.getElementById('pasteWrap');
  if(!a||!b||a._syncBound)return;
  a._syncBound=true;
  let busy=false;
  a.addEventListener('scroll',()=>{if(busy)return;busy=true;b.scrollLeft=a.scrollLeft;requestAnimationFrame(()=>busy=false);},{passive:true});
  b.addEventListener('scroll',()=>{if(busy)return;busy=true;a.scrollLeft=b.scrollLeft;requestAnimationFrame(()=>busy=false);},{passive:true});
}

function fmtDates(){
  const out=[],now=new Date();now.setHours(0,0,0,0);
  const w=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(let i=-1;i<=7;i++){
    const d=new Date(now);d.setDate(now.getDate()+i);
    const iso=localISO(d),mmdd=(d.getMonth()+1)+'/'+d.getDate(),dow=d.getDay();
    let cls='',d1=mmdd,d2=w[dow];
    if(i===-1){cls='yest';d1='Yesterday';d2=mmdd+' '+w[dow];}
    if(i===0){cls='today';d1='Today';d2=mmdd+' '+w[dow];}
    out.push({iso,d1,d2,cls,dow});
  }
  return out;
}

// ── Scroll Picker ──
const HOURS = Array.from({length:24},(_,i)=>i);
const MINS  = Array.from({length:12},(_,i)=>i*5);
const ITEM_H = 44;

function makeScrollPicker(items, initVal, onChange){
  const outer=document.createElement('div'); outer.className='sp-col-outer';
  const upBtn=document.createElement('button'); upBtn.type='button'; upBtn.className='sp-arrow'; upBtn.textContent='▲';
  const wrap=document.createElement('div'); wrap.className='sp-col';
  const downBtn=document.createElement('button'); downBtn.type='button'; downBtn.className='sp-arrow'; downBtn.textContent='▼';

  const padBefore=document.createElement('div'); padBefore.style.height=ITEM_H+'px'; wrap.appendChild(padBefore);
  const els=[];
  items.forEach(v=>{
    const el=document.createElement('div'); el.className='sp-item'; el.textContent=pad2(v);
    el.onclick=()=>nudge(items.indexOf(v));
    wrap.appendChild(el); els.push(el);
  });
  const padAfter=document.createElement('div'); padAfter.style.height=ITEM_H+'px'; wrap.appendChild(padAfter);

  function updateSel(){
    const idx=Math.round(wrap.scrollTop/ITEM_H);
    els.forEach((e,i)=>e.classList.toggle('sel',i===idx));
    if(items[idx]!==undefined) onChange(items[idx]);
  }
  function nudge(targetIdx){
    const clamped=Math.max(0,Math.min(items.length-1,targetIdx));
    wrap.scrollTo({top:clamped*ITEM_H,behavior:'smooth'});
  }

  const initIdx=items.indexOf(initVal);
  requestAnimationFrame(()=>{ wrap.scrollTop=Math.max(0,initIdx)*ITEM_H; updateSel(); });

  let scrollTimer;
  wrap.addEventListener('scroll',()=>{
    clearTimeout(scrollTimer);
    scrollTimer=setTimeout(()=>{
      const idx=Math.max(0,Math.min(items.length-1,Math.round(wrap.scrollTop/ITEM_H)));
      wrap.scrollTo({top:idx*ITEM_H,behavior:'smooth'});
      updateSel();
    },150);
    updateSel();
  },{passive:true});
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    wrap.scrollTop += Math.sign(e.deltaY) * ITEM_H * 0.4;
  },{passive:false});

  upBtn.onclick = ()=>nudge(Math.round(wrap.scrollTop/ITEM_H)-1);
  downBtn.onclick = ()=>nudge(Math.round(wrap.scrollTop/ITEM_H)+1);
  outer.appendChild(upBtn); outer.appendChild(wrap); outer.appendChild(downBtn);
  return outer;
}

function makeTimePicker(initH, initM, onSave, onCancel){
  let curH=initH, curM=initM;
  const container=document.createElement('div'); container.style.cssText='display:flex;flex-direction:column;align-items:center;gap:10px';
  const tpWrap=document.createElement('div'); tpWrap.className='tp-wrap';
  const hPicker=makeScrollPicker(HOURS,initH,v=>curH=v);
  const sep=document.createElement('span'); sep.className='tp-sep'; sep.textContent=':';
  const mPicker=makeScrollPicker(MINS,MINS.includes(initM)?initM:0,v=>curM=v);
  tpWrap.appendChild(hPicker); tpWrap.appendChild(sep); tpWrap.appendChild(mPicker);
  container.appendChild(tpWrap);
  const acts=document.createElement('div'); acts.className='picker-actions';
  const cancelBtn=document.createElement('button'); cancelBtn.type='button'; cancelBtn.className='cell-btn cancel'; cancelBtn.textContent='Cancel'; cancelBtn.onclick=onCancel;
  const saveBtn=document.createElement('button'); saveBtn.type='button'; saveBtn.className='cell-btn save-time';
  saveBtn.innerHTML='<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Save';
  saveBtn.onclick=()=>onSave(pad2(curH)+':'+pad2(curM));
  acts.appendChild(cancelBtn); acts.appendChild(saveBtn);
  container.appendChild(acts);
  return container;
}

// ── Flash messages ──
const JOKE_MSG = 'Round out the jokes, pls don\'t click again';
const _flashCounts = new WeakMap();
let _flashIdx = -1;
function showFlash(cellEl, fixedMsg){
  const old=cellEl.querySelector('.flash-overlay');
  if(old){clearTimeout(old._timer);old.remove();}
  let msg;
  if(fixedMsg){
    msg=fixedMsg;
  } else {
    const count=(_flashCounts.get(cellEl)||0)+1;
    _flashCounts.set(cellEl,count);
    if(count>=3){
      msg=JOKE_MSG;
    } else {
      const pool=FLASH_MSGS.filter(m=>m!==JOKE_MSG);
      let next;
      do{next=Math.floor(Math.random()*pool.length);}while(pool.length>1&&next===_flashIdx);
      _flashIdx=next; msg=pool[_flashIdx];
    }
  }
  const overlay=document.createElement('div'); overlay.className='flash-overlay'; overlay.textContent=msg;
  cellEl.appendChild(overlay);
  overlay._timer=setTimeout(()=>{
    overlay.style.transition='opacity .5s'; overlay.style.opacity='0';
    setTimeout(()=>overlay.remove(),500);
  },5000);
}

    const tr=document.createElement('tr');

    inner+=`<div class="pmenu">

      <button class="mbtn" onclick="editAddr('${jsesc(p)}')">${I.pin} My Address</button>
      <button class="mbtn danger" onclick="delPerson('${jsesc(p)}')">${I.trash} Remove Name</button>
    </div>`;
    ph.innerHTML=inner; ptd.appendChild(ph); tr.appendChild(ptd);

    dates.forEach(dt=>{
      const td=document.createElement('td'), k=ckey(p,dt.iso);
      const cell=document.createElement('div');
      const blocked=isHoliday(dt.iso), isSunday=dt.dow===0;
      cell.className='cell'+(blocked?' blkd':'');

      if(blocked){
        cell.onclick=()=>showFlash(cell);
        const msg=document.createElement('div'); msg.className='blocked-msg'; msg.textContent='Booking Unavailable';
        cell.appendChild(msg);
      } else if(isSunday){
        const s=document.createElement('div'); s.className='cell-sunday'; s.textContent='🏠';
        s.onclick=()=>showFlash(cell,'Stay home, Stay safe');
        cell.appendChild(s);
        appendAdminInfo(cell,k);
      } else {
        const cs=cellEditState[k]||{};
        const savedTime=(state.cells[k]||{}).time||'';
        const a=state.admin[k]||{};
        const hasAdminInfo=!!(a.driver||a.plate||a.mobile);

        if(cs.editing){
          const initH=cs.h!=null?cs.h:(savedTime?parseInt(savedTime.split(':')[0]):8);
          const initM=cs.m!=null?cs.m:(savedTime?parseInt(savedTime.split(':')[1]):0);
          const picker=makeTimePicker(initH,initM,
            val=>{state.cells[k]={time:val};delete cellEditState[k];save();render();toast('Saved: '+val);},
            ()=>{delete cellEditState[k];render();}
          );
          cell.appendChild(picker);
        } else if(savedTime){
          const row=document.createElement('div'); row.className='time-row';
          const badge=document.createElement('div'); badge.className='time-badge'; badge.textContent=savedTime;
          row.appendChild(badge);
          if(!hasAdminInfo&&!isAdmin){
            const editBtn=document.createElement('button'); editBtn.type='button'; editBtn.className='cell-btn edit-time';
            editBtn.innerHTML='<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg> Edit';
            editBtn.onclick=()=>{const p2=savedTime.split(':');cellEditState[k]={editing:true,h:parseInt(p2[0]),m:parseInt(p2[1])};render();};
            row.appendChild(editBtn);
          }
          cell.appendChild(row);
          appendAdminInfo(cell,k);
        } else {
          if(!isAdmin){
            const prompt=document.createElement('button'); prompt.type='button'; prompt.className='cell-prompt';
            prompt.innerHTML=I.clock+' Your pick up time';
            prompt.onclick=()=>{cellEditState[k]={editing:true,h:8,m:0};render();};
            cell.appendChild(prompt);
          }
          appendAdminInfo(cell,k);
        }
      }
      td.appendChild(cell); tr.appendChild(td);
    });

  atd.appendChild(ab); addtr.appendChild(atd);
  const sp=document.createElement('td'); sp.colSpan=dates.length; addtr.appendChild(sp);
  body.appendChild(addtr);

}

function appendAdminInfo(cell,k){
  const a=state.admin[k]||{};
  if(a.driver||a.plate||a.mobile){
    const box=document.createElement('div'); box.className='admininfo';
    if(a.driver) box.innerHTML+=`<div class="arow">${I.user}<span>${esc(a.driver)}</span></div>`;
    if(a.plate)  box.innerHTML+=`<div class="arow">${I.car}<span class="plate">${esc(a.plate)}</span></div>`;
    if(a.mobile) box.innerHTML+=`<div class="arow">${I.phone}<span>${esc(a.mobile)}</span></div>`;
    cell.appendChild(box);
  }
}

// ── User actions ──
function addPerson(){openModal('Enter name','',v=>{v=v.trim();if(!v)return;if(!state.persons.includes(v)){state.persons.push(v);save();render();renderPasteTable();}else toast('Name already exists');});}
function renamePerson(p){
  openModal('Rename "'+p+'"',p,v=>{
    v=v.trim();if(!v||v===p)return;
    if(state.persons.includes(v)){toast('Name already exists');return;}
    const idx=state.persons.indexOf(p);if(idx>=0)state.persons[idx]=v;
    if(state.addresses[p]){state.addresses[v]=state.addresses[p];delete state.addresses[p];}
    const rekey=obj=>{Object.keys(obj).forEach(k=>{if(k.startsWith(p+'|')){obj[v+'|'+k.slice(p.length+1)]=obj[k];delete obj[k];}});};
    rekey(state.cells);rekey(state.admin);
    save();render();renderPasteTable();toast('Renamed to '+v);
  });
}
function editAddr(p){openModal('Address for "'+p+'" (blank to remove)',state.addresses[p]||'',v=>{v=v.trim();if(v)state.addresses[p]=v;else delete state.addresses[p];save();render();renderPasteTable();});}
function delPerson(p){if(!confirm('Remove "'+p+'"? All entries deleted.'))return;
  state.persons=state.persons.filter(x=>x!==p);delete state.addresses[p];
  Object.keys(state.cells).forEach(k=>{if(k.startsWith(p+'|'))delete state.cells[k];});
  Object.keys(state.admin).forEach(k=>{if(k.startsWith(p+'|'))delete state.admin[k];});
  save();render();renderPasteTable();}

// ── Access gate ──
function showLoginGate(){
  document.getElementById('loadOverlay').classList.remove('on');
  document.getElementById('accessOverlay').classList.add('on');
  const inp=document.getElementById('accessInput');
  inp.value='';
  setTimeout(()=>inp.focus(),40);
  inp.onkeydown=e=>{if(e.key==='Enter')doAccess();};
}

function checkAccess(){
  firebase.auth().onAuthStateChanged(user=>{
    if(user){
      if(user.email===ADMIN_EMAIL){
        isAdmin=true;
        document.getElementById('adminBadge').classList.add('on');
        document.getElementById('adminBtn').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1l9 4v6c0 5-3.8 9.4-9 11-5.2-1.6-9-6-9-11V5z"/></svg> Admin Logout';
      }
      startListening();
    } else {
      showLoginGate();
    }
  });
}

async function doAccess(){
  const pw=document.getElementById('accessInput').value.trim();
  if(!pw) return;
  // Try user login, then admin login
  const emails=[USER_EMAIL, ADMIN_EMAIL];
  let success=false;
  for(const email of emails){
    try{
      await firebase.auth().signInWithEmailAndPassword(email, pw);
      success=true; break;
    }catch(e){}
  }
  if(!success){
    toast('Incorrect access code');
    document.getElementById('accessInput').value='';
    setTimeout(()=>document.getElementById('accessInput').focus(),50);
  } else {
    document.getElementById('accessOverlay').classList.remove('on');
    document.getElementById('loadOverlay').classList.add('on');
    // onAuthStateChanged will fire and call startListening
  }
}

// ── Admin login / logout ──
async function toggleAdmin(){
  if(isAdmin){
    isAdmin=false;
    document.getElementById('adminBadge').classList.remove('on');
    document.getElementById('adminBtn').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1l9 4v6c0 5-3.8 9.4-9 11-5.2-1.6-9-6-9-11V5z"/></svg> Admin Login';
    fbListening=false;
    dbRef.off();
    await firebase.auth().signOut();
    render();
    showLoginGate();
  } else {
    // Escalate: sign out current user, re-login as admin
    openModal('Enter admin code','',async v=>{
      const pw=v.trim(); if(!pw) return;
      try{
        fbListening=false; dbRef.off();
        await firebase.auth().signOut();
        await firebase.auth().signInWithEmailAndPassword(ADMIN_EMAIL, pw);
        isAdmin=true;
        document.getElementById('adminBadge').classList.add('on');
        document.getElementById('adminBtn').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1l9 4v6c0 5-3.8 9.4-9 11-5.2-1.6-9-6-9-11V5z"/></svg> Admin Logout';
        startListening();
        render();renderPasteTable();renderHolidays();toast('Admin mode enabled');
      }catch(e){ toast('Incorrect access code'); }
    },true);
  }
}

  const corner=document.createElement('th');corner.className='corner';corner.textContent='Name \\ Date';head.appendChild(corner);
  dates.forEach(dt=>{
    const th=document.createElement('th');th.className='date '+dt.cls+(isHoliday(dt.iso)?' blkd':'');
    th.innerHTML=`<div class="d">${dt.d1}</div><div class="w">${dt.d2}</div>`;head.appendChild(th);
  });
  if(!state.persons.length){
    const tr=document.createElement('tr'),td=document.createElement('td');td.colSpan=dates.length+1;td.className='empty-row';td.textContent='Add passengers in Schedule first';tr.appendChild(td);body.appendChild(tr);return;
  }
  state.persons.forEach(p=>{
    const tr=document.createElement('tr');
    const ptd=document.createElement('td');ptd.className='person';
    const ph=document.createElement('div');ph.className='paste-phead';
    const nm=document.createElement('div');nm.className='paste-pname';nm.textContent=p;ph.appendChild(nm);
    if(state.addresses[p]){const ad=document.createElement('div');ad.className='paste-paddr';ad.textContent='Address: '+state.addresses[p];ph.appendChild(ad);}
    ptd.appendChild(ph);tr.appendChild(ptd);
    dates.forEach(dt=>{
      const k=ckey(p,dt.iso),td=document.createElement('td'),cell=document.createElement('div');
      cell.className='paste-cell'+(isHoliday(dt.iso)?' blkd':'');
      if(!isHoliday(dt.iso))buildPasteCell(cell,k,p,dt.iso);
      td.appendChild(cell);tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

function buildPasteCell(cell,k,person,dateIso){
  cell.innerHTML='';
  const result=pasteResults[k];
  if(result&&result.success){
    const suc=document.createElement('div');suc.className='paste-success';suc.textContent='✓ Upload successfully';
    const clr=document.createElement('button');clr.className='paste-clearbtn';clr.textContent='Clear';clr.onclick=()=>{delete pasteResults[k];buildPasteCell(cell,k,person,dateIso);};
    cell.appendChild(suc);cell.appendChild(clr);
  } else {
    if(result&&result.errors&&result.errors.length){
      const errDiv=document.createElement('div');errDiv.className='paste-err-list';
      errDiv.innerHTML=result.errors.map(e=>'⚠ '+esc(e)).join('<br>');cell.appendChild(errDiv);
    }
    const ta=document.createElement('textarea');ta.className='paste-area'+(result&&result.errors?.length?' has-error':'');
    ta.placeholder='Paste booking text here…';if(result&&result.text)ta.value=result.text;
    ta.addEventListener('blur',()=>validatePaste(ta.value,k,person,dateIso,cell));
    cell.appendChild(ta);
  }
}

function parseBookingText(text){
  const get=key=>{const m=text.match(new RegExp(key+'\\s*:?\\s*([^\\n\\r]+)','i'));return m?m[1].trim():null;};
  return{reportingTime:get('REPORTING\\s+TIME'),reportingDate:get('REPORTING\\s+DATE'),guestName:get('GUEST\\s+NAME'),vehicleNumber:get('VEHICLE\\s+NUMBER'),chauffeur:get('CHAUFFEUR'),mobileNo:get('MOBILE\\s+NO\\.?')};
}

function validatePaste(text,k,person,dateIso,cell){
  if(!text.trim()){pasteResults[k]={text:''};buildPasteCell(cell,k,person,dateIso);return;}
  const p=parseBookingText(text),errors=[];
  if(p.guestName){if(stripPrefix(p.guestName).toLowerCase()!==stripPrefix(person).toLowerCase())errors.push(`Guest Name mismatch: found "${p.guestName}", expected "${person}"`);}
  else errors.push('GUEST NAME not found in text');
  if(p.reportingDate){if(!matchDate(p.reportingDate,dateIso))errors.push(`Reporting Date "${p.reportingDate}" does not match column date "${dateIso}"`);}
  else errors.push('REPORTING DATE not found in text');
  if(p.reportingTime){
    const rM=timeToMins(p.reportingTime),ut=(state.cells[k]||{}).time||'';
    if(!ut)errors.push('No pickup time set in Schedule for this cell');
    else{const pM=timeToMins(ut);if(!isNaN(rM)&&!isNaN(pM)&&rM>pM)errors.push(`Reporting Time "${p.reportingTime}" must be at or before your pickup time "${ut}"`);}
  } else errors.push('REPORTING TIME not found in text');
  if(errors.length){pasteResults[k]={success:false,errors,text};buildPasteCell(cell,k,person,dateIso);return;}
  state.admin[k]=Object.assign({},state.admin[k]||{},{driver:p.chauffeur||'',plate:p.vehicleNumber||'',mobile:p.mobileNo||''});
  save();render();pasteResults[k]={success:true,text};buildPasteCell(cell,k,person,dateIso);toast('✓ Upload successful: '+person+' / '+dateIso);
}

// ── Holiday Section ──
function renderHolidays(){
  if(!isAdmin)return;
  const list=document.getElementById('holList');list.innerHTML='';
  (state.holidays||[]).forEach(h=>{
    const row=document.createElement('div');row.className='hol-row';
    row.onclick=()=>openCalModal(h.id);
    const dot=document.createElement('div');dot.className='hol-dot';
    const lbl=document.createElement('div');lbl.className='hol-label';lbl.textContent=fmtHolRange(h);
    const del=document.createElement('button');del.className='hol-del';del.textContent='✕';
    del.onclick=e=>{e.stopPropagation();delHoliday(h.id);};
    row.appendChild(dot);row.appendChild(lbl);row.appendChild(del);list.appendChild(row);
  });
}
function delHoliday(id){
  state.holidays=state.holidays.filter(h=>h.id!==id);save();render();renderPasteTable();renderHolidays();
}

// ── Calendar Modal ──
function openCalModal(editId){
  calEditId=editId;
  let initSel=null;
  if(editId){const h=state.holidays.find(x=>x.id===editId);if(h)initSel={start:h.start,end:h.end};}
  document.getElementById('calContainer').innerHTML='';
  calPicker=makeCalendar(initSel,updateCalSelText);
  document.getElementById('calContainer').appendChild(calPicker.el);
  updateCalSelText(calPicker.getSelection());
  document.getElementById('calOverlay').classList.add('on');
}
function closeCalModal(){document.getElementById('calOverlay').classList.remove('on');calPicker=null;calEditId=null;}
function saveCalModal(){
  if(!calPicker)return;
  const sel=calPicker.getSelection();
  if(!sel){toast('Please select at least one date');return;}
  if(calEditId){const h=state.holidays.find(x=>x.id===calEditId);if(h){h.start=sel.start;h.end=sel.end;}}
  else{state.holidays.push({id:genId(),start:sel.start,end:sel.end});}
  save();render();renderPasteTable();renderHolidays();closeCalModal();toast('Holiday saved');
}
function updateCalSelText(sel){
  const el=document.getElementById('calSelText');if(!el)return;
  if(!sel)el.textContent='';
  else if(sel.start===sel.end)el.textContent='Selected: '+sel.start;
  else el.textContent='Selected: '+sel.start+' → '+sel.end;
}

function makeCalendar(initSel, onSelChange){
  const now=new Date();
  let viewY=now.getFullYear(), viewM=now.getMonth();
  let selStart=initSel?initSel.start:null, selEnd=initSel?initSel.end:null;
  let phase=initSel?'done':'none';
  let hoverDate=null;
  const todayISO=localISO(now);
  const el=document.createElement('div');

  function renderCal(){
    el.innerHTML='';
    const hdr=document.createElement('div');hdr.className='cal-hdr';
    const prev=document.createElement('button');prev.type='button';prev.textContent='‹';
    prev.onclick=()=>{viewM--;if(viewM<0){viewM=11;viewY--;}renderCal();};
    const title=document.createElement('span');title.className='cal-title';
    title.textContent=new Date(viewY,viewM,1).toLocaleString('en',{month:'long',year:'numeric'});
    const next=document.createElement('button');next.type='button';next.textContent='›';
    next.onclick=()=>{viewM++;if(viewM>11){viewM=0;viewY++;}renderCal();};
    hdr.appendChild(prev);hdr.appendChild(title);hdr.appendChild(next);el.appendChild(hdr);
    const dayHdr=document.createElement('div');dayHdr.className='cal-days';
    ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d=>{const c=document.createElement('div');c.className='cal-dh';c.textContent=d;dayHdr.appendChild(c);});
    el.appendChild(dayHdr);
    const grid=document.createElement('div');grid.className='cal-grid';
    const firstDow=new Date(viewY,viewM,1).getDay();
    const startOff=(firstDow===0?6:firstDow-1);
    const dim=new Date(viewY,viewM+1,0).getDate();
    for(let i=0;i<startOff;i++){const c=document.createElement('div');c.className='cal-cell empty';grid.appendChild(c);}
    for(let d=1;d<=dim;d++){
      const iso=`${viewY}-${pad2(viewM+1)}-${pad2(d)}`;
      const c=document.createElement('div');c.className='cal-cell';c.textContent=d;
      if(iso===todayISO)c.classList.add('c-today');
      const isStart=iso===selStart,isEnd=iso===(selEnd||selStart);
      const inRange=selStart&&selEnd&&iso>selStart&&iso<selEnd;
      const inHover=phase==='one'&&hoverDate&&selStart&&iso>selStart&&iso<=hoverDate;
      if(isStart)c.classList.add('c-start');
      if(isEnd&&selEnd&&selEnd!==selStart)c.classList.add('c-end');
      if(inRange)c.classList.add('c-range');
      if(inHover)c.classList.add('c-hover');
      c.onclick=()=>{
        if(phase==='none'||phase==='done'){selStart=iso;selEnd=null;phase='one';}
        else{if(iso<selStart){selEnd=selStart;selStart=iso;}else{selEnd=iso;}phase='done';}
        hoverDate=null;renderCal();onSelChange&&onSelChange(getSelection());
      };
      c.onmouseenter=()=>{if(phase==='one'){hoverDate=iso;renderCal();}};
      c.onmouseleave=()=>{if(phase==='one'){hoverDate=null;renderCal();}};
      grid.appendChild(c);
    }
    el.appendChild(grid);
  }
  function getSelection(){
    if(phase==='none'||!selStart)return null;
    return{start:selStart,end:selEnd||selStart};
  }
  renderCal();
  return{el,getSelection};
}

// ── Modal ──
function openModal(title,val,cb,isPass=false){
  document.getElementById('mTitle').textContent=title;
  const inp=document.getElementById('mInput');inp.value=val;inp.type=isPass?'password':'text';modalCb=cb;
  document.getElementById('overlay').classList.add('on');setTimeout(()=>inp.focus(),40);
  inp.onkeydown=e=>{if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal();};
}
function closeModal(){document.getElementById('overlay').classList.remove('on');modalCb=null;}
function confirmModal(){const v=document.getElementById('mInput').value,cb=modalCb;closeModal();if(cb)cb(v);}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});
document.getElementById('calOverlay').addEventListener('click',e=>{if(e.target.id==='calOverlay')closeCalModal();});

let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('on'),2400);}
document.addEventListener('click',e=>{if(!e.target.closest('.phead'))document.querySelectorAll('.phead.open').forEach(x=>x.classList.remove('open'));});

checkAccess();
</script>
